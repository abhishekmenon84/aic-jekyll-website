<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- Logo -->
    <a href="{{ '/' | relative_url }}" class="flex items-center gap-3">
      <img src="{{ '/assets/images/logo.jpeg' | relative_url }}" alt="AIC Logo"
           class="w-10 h-10 rounded-full object-cover ring-2 ring-white/30" />
      <span class="logo-text text-white font-semibold text-sm leading-tight hidden sm:block">
        Association of<br><span class="text-saffron">Indo-Canadians</span>
      </span>
    </a>

    <!-- Desktop nav -->
    <div class="hidden md:flex items-center gap-7">
      {% for item in site.data.navigation.main %}
        <a href="{{ item.url | relative_url }}" class="nav-link text-white font-medium text-sm tracking-wide">
          {{ item.title }}
        </a>
      {% endfor %}
      <a href="{{ '/volunteer/' | relative_url }}" class="btn-saffron text-sm px-5 py-2.5">
        Volunteer 🍁
      </a>
    </div>

    <!-- Hamburger -->
    <button id="hamburger" class="md:hidden flex flex-col gap-1.5 p-2" onclick="toggleMenu()" aria-label="Menu">
      <span class="ham-bar w-6 h-0.5 bg-white rounded block transition-all"></span>
      <span class="ham-bar w-6 h-0.5 bg-white rounded block transition-all"></span>
      <span class="ham-bar w-6 h-0.5 bg-white rounded block transition-all"></span>
    </button>
  </div>
</nav>

<!-- Mobile menu overlay -->
<div id="mobile-menu" class="fixed inset-0 z-40 bg-charcoal/98 flex-col items-center justify-center gap-8 hidden">
  <button onclick="toggleMenu()" class="absolute top-6 right-6 text-white text-3xl" aria-label="Close">✕</button>
  {% for item in site.data.navigation.main %}
    <a href="{{ item.url | relative_url }}" onclick="toggleMenu()"
       class="text-white text-2xl font-serif hover:text-saffron transition-colors">
      {{ item.title }}
    </a>
  {% endfor %}
  <a href="{{ '/volunteer/' | relative_url }}" onclick="toggleMenu()" class="btn-saffron">
    Volunteer 🍁
  </a>
</div>
